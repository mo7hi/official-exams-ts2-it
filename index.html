<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Exams Archive - TS2 IT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --card-bg: #ffffff;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-bg: #d1fae5;
            --danger: #ef4444;
            --danger-bg: #fee2e2;
            --border-color: #e5e7eb;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --text-color: #f9fafb;
            --card-bg: #1f2937;
            --primary: #60a5fa;
            --primary-hover: #3b82f6;
            --success: #34d399;
            --success-bg: rgba(16, 185, 129, 0.2);
            --danger: #f87171;
            --danger-bg: rgba(239, 68, 68, 0.2);
            --border-color: #374151;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: var(--transition);
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        button, select {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            outline: none;
        }

        button:hover, select:hover {
            border-color: var(--primary);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            border: none;
        }

        .search-bar {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            margin-bottom: 2rem;
            transition: var(--transition);
        }

        .search-bar:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .year-card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .year-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: var(--primary);
        }

        .year-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .year-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .curriculum-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            background-color: var(--border-color);
            color: var(--text-color);
            font-weight: 600;
        }

        .session-section {
            margin-top: 1rem;
        }

        .session-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .subject-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .subject-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            border-radius: 0.25rem;
            background-color: var(--bg-color);
            font-size: 0.9rem;
            text-decoration: none;
            color: var(--text-color);
            transition: var(--transition);
        }

        a.subject-item:hover {
            filter: brightness(0.95);
        }
        [data-theme="dark"] a.subject-item:hover {
            filter: brightness(1.2);
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-weight: 600;
        }

        .status-available {
            background-color: var(--success-bg);
            color: var(--success);
        }

        .status-missing {
            background-color: var(--danger-bg);
            color: var(--danger);
        }

        .stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            flex: 1;
            background-color: var(--card-bg);
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* RTL Support */
        body[dir="rtl"] {
            font-family: 'Inter', Tahoma, Arial, sans-serif;
        }
        
        .hidden {
            display: none !important;
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="app-title">Official Exams Archive</h1>
            <div class="controls">
                <select id="lang-select" onchange="changeLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="ar">العربية</option>
                    <option value="fr">Français</option>
                </select>
                <select id="filter-select" onchange="renderData()">
                    <option value="all" id="filter-all">All Files</option>
                    <option value="available" id="filter-available">Available Only</option>
                    <option value="missing" id="filter-missing">Missing Only</option>
                </select>
                <button id="theme-toggle" onclick="toggleTheme()">
                    <span id="theme-icon">🌙</span> <span id="theme-text">Dark Mode</span>
                </button>
            </div>
        </header>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="stat-total">0</div>
                <div id="stat-total-label">Total Files</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" style="color: var(--success)" id="stat-available">0</div>
                <div id="stat-available-label">Available</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" style="color: var(--danger)" id="stat-missing">0</div>
                <div id="stat-missing-label">Missing</div>
            </div>
        </div>

        <input type="text" id="search-input" class="search-bar" placeholder="Search years, sessions, subjects..." oninput="renderData()">

        <div class="grid" id="data-container">
            <!-- Content will be injected here by JS -->
        </div>
    </div>

        let currentLang = 'en';

        function toggleTheme() {
            const root = document.documentElement;
            const currentTheme = root.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', newTheme);
            
            const themeText = document.getElementById('theme-text');
            const themeIcon = document.getElementById('theme-icon');
            
            if (newTheme === 'dark') {
                themeText.textContent = translations[currentLang].light_mode;
                themeIcon.textContent = '☀️';
            } else {
                themeText.textContent = translations[currentLang].dark_mode;
                themeIcon.textContent = '🌙';
            }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
            
            // Update static texts
            document.getElementById('app-title').textContent = translations[lang].app_title;
            document.getElementById('search-input').placeholder = translations[lang].search_placeholder;
            document.getElementById('filter-all').textContent = translations[lang].filter_all;
            document.getElementById('filter-available').textContent = translations[lang].filter_available;
            document.getElementById('filter-missing').textContent = translations[lang].filter_missing;
            document.getElementById('stat-total-label').textContent = translations[lang].stat_total;
            document.getElementById('stat-available-label').textContent = translations[lang].stat_available;
            document.getElementById('stat-missing-label').textContent = translations[lang].stat_missing;
            
            // Update theme text
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.getElementById('theme-text').textContent = isDark ? translations[lang].light_mode : translations[lang].dark_mode;

            renderData();
        }

        function renderData() {
            const container = document.getElementById('data-container');
            const filter = document.getElementById('filter-select').value;
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            const t = translations[currentLang];
            
            container.innerHTML = '';
            
            let total = 0;
            let available = 0;
            let missing = 0;

            // Sort years descending
            const years = Object.keys(rawData).sort((a, b) => b - a);

            years.forEach(year => {
                let yearMatchSearch = year.includes(searchQuery);
                
                const sessions = [1, 2];
                let yearHasContent = false;
                let yearHtml = `<div class="year-card">
                    <div class="year-header">
                        <span class="year-title">${t.year} ${year}</span>
                        <span class="curriculum-badge">${rawData[year]["1"].curriculum === "231" ? t.curr231 : t.curr240}</span>
                    </div>`;

                sessions.forEach(session => {
                    const sData = rawData[year][session.toString()];
                    let sessionMatchSearch = session.toString().includes(searchQuery);
                    
                    let sessionHtml = `<div class="session-section">
                        <div class="session-title">${t.session} ${session}</div>
                        <div class="subject-list">`;
                    
                    let sessionHasContent = false;

                    const subjects = Object.values(sData.subjects).sort((a, b) => a.code.localeCompare(b.code));
                    
                    subjects.forEach(sub => {
                        total++;
                        if (sub.available) available++;
                        else missing++;

                        const subName = t[sub.nameKey] || sub.nameEn;
                        const subMatchSearch = subName.toLowerCase().includes(searchQuery) || sub.code.includes(searchQuery);
                        
                        let showSubject = true;

                        // Filter logic
                        if (filter === 'available' && !sub.available) showSubject = false;
                        if (filter === 'missing' && sub.available) showSubject = false;

                        // Search logic
                        if (searchQuery && !yearMatchSearch && !sessionMatchSearch && !subMatchSearch) showSubject = false;

                        if (showSubject) {
                            yearHasContent = true;
                            sessionHasContent = true;
                            
                            const statusText = sub.available ? t.available : t.missing;
                            const statusClass = sub.available ? 'status-available' : 'status-missing';
                            const titleAttr = sub.available ? sub.path : 'File missing';
                            
                            const itemTag = sub.available ? 'a' : 'div';
                            const hrefAttr = sub.available ? `href="${sub.path}" target="_blank"` : '';

                            sessionHtml += `
                                <${itemTag} ${hrefAttr} class="subject-item" title="${titleAttr}">
                                    <span>${sub.code} - ${subName}</span>
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                </${itemTag}>
                            `;
                        }
                    });

                    sessionHtml += `</div></div>`;
                    
                    if (sessionHasContent) {
                        yearHtml += sessionHtml;
                    }
                });

                yearHtml += `</div>`;
                
                if (yearHasContent) {
                    container.innerHTML += yearHtml;
                }
            });

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-available').textContent = available;
            document.getElementById('stat-missing').textContent = missing;
        }
